global:
  nodeSelector: {}
  tolerations:
  - key: "storage"
    operator: "Equal"
    value: "longhorn"
    effect: "NoSchedule"

service:
  ui:
    type: LoadBalancer

preUpgradeChecker:
  jobEnabled: false

defaultSettings:
  taintToleration: "storage=longhorn:NoSchedule"
  createDefaultDiskLabeledNodes: true

ingress:
  enabled: true
  ingressClassName: traefik
  host: longhorn.cornfakes.xyz
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: traefik-redirect@kubernetescrd