defaultSettings:
  defaultDataPath: /var/lib/longhorn
  defaultReplicaCount: "2"

persistence:
  defaultClass: true
  defaultClassReplicaCount: "2"

longhornManager:
  tolerations:
    - key: storage
      operator: Equal
      value: longhorn
      effect: NoSchedule
  nodeSelector:
    node.longhorn.io/create-default-disk: "true"

longhornDriver:
  tolerations:
    - key: storage
      operator: Equal
      value: longhorn
      effect: NoSchedule
  nodeSelector:
    node.longhorn.io/create-default-disk: "true"

longhornUI:
  tolerations:
    - key: storage
      operator: Equal
      value: longhorn
      effect: NoSchedule

metrics:
  serviceMonitor:
    enabled: false