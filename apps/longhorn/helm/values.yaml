global:
  tolerations:
    - key: "storage"
      operator: "Equal"
      value: "longhorn"
      effect: "NoSchedule"
  nodeSelector:
    node-role.kubernetes.io/storage: "true"

csi:
  kubeletRootDir: /var/lib/kubelet
  attacherReplicaCount: 3
  provisionerReplicaCount: 3
  resizerReplicaCount: 3
  snapshotterReplicaCount: 3

longhornManager:
  tolerations: []
  nodeSelector: {}

longhornDriver:
  tolerations: []
  nodeSelector: {}

longhornUI:
  tolerations: []
  nodeSelector: {}

service:
  ui:
    type: LoadBalancer

preUpgradeChecker:
  jobEnabled: false

defaultSettings:
  defaultDataPath: /var/lib/longhorn
  taintToleration: "storage=longhorn:NoSchedule"
  systemManagedComponentsNodeSelector: "node-role.kubernetes.io/storage:true"

ingress:
  enabled: true
  ingressClassName: traefik
  host: longhorn.cornfakes.xyz
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: traefik-redirect@kubernetescrd