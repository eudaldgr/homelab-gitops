installCRDs: true

preUpgradeChecker:
  jobEnabled: false

csi:
  kubeletRootDir: /var/lib/kubelet

global:
  nodeSelector:
    node-role.kubernetes.io/storage: "true"

defaultSettings:
  systemManagedComponentsNodeSelector: "node-role.kubernetes.io/storage:true"
  taintToleration: "storage=longhorn:NoSchedule"
  defaultDataPath: /var/lib/longhorn
  defaultReplicaCount: "2"

longhornManager:
  nodeSelector:
    node-role.kubernetes.io/storage: "true"
  tolerations:
    - key: "storage"
      operator: "Equal"
      value: "longhorn"
      effect: "NoSchedule"

longhornDriver:
  nodeSelector:
    node-role.kubernetes.io/storage: "true"
  tolerations:
    - key: "storage"
      operator: "Equal"
      value: "longhorn"
      effect: "NoSchedule"

longhornUI:
  nodeSelector:
    node-role.kubernetes.io/storage: "true"
  tolerations:
    - key: "storage"
      operator: "Equal"
      value: "longhorn"
      effect: "NoSchedule"

ingress:
  enabled: true
  ingressClassName: traefik
  host: longhorn.cornfakes.xyz
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: traefik-redirect@kubernetescrd