installCRDs: true

preUpgradeChecker:
  jobEnabled: false

csi:
  kubeletRootDir: /var/lib/kubelet

global:
  nodeSelector:
    node-role.kubernetes.io/storage: "true"
  domain: longhorn.cornfakes.xyz

defaultSettings:
  systemManagedComponentsNodeSelector: "node-role.kubernetes.io/storage:true"
  taintToleration: "storage=longhorn:NoSchedule"
  defaultDataPath: /var/lib/longhorn
  defaultReplicaCount: "2"

longhornManager:
  nodeSelector:
    node-role.kubernetes.io/storage: "true"
  tolerations:
    - key: "storage"
      operator: "Equal"
      value: "longhorn"
      effect: "NoSchedule"

longhornDriver:
  nodeSelector:
    node-role.kubernetes.io/storage: "true"
  tolerations:
    - key: "storage"
      operator: "Equal"
      value: "longhorn"
      effect: "NoSchedule"

longhornUI:
  nodeSelector:
    node-role.kubernetes.io/storage: "true"
  tolerations:
    - key: "storage"
      operator: "Equal"
      value: "longhorn"
      effect: "NoSchedule"

server:
  ingress:
    enabled: true
    controller: generic
    labels: {}
    annotations:
      traefik.ingress.kubernetes.io/router.middlewares: traefik-redirect@kubernetescrd
    ingressClassName: traefik
    hostname: "longhorn.cornfakes.xyz"
    path: /
    pathType: Prefix
    tls: false