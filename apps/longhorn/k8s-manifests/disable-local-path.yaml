---
# Job per desactivar el StorageClass local-path de K3s
apiVersion: v1
kind: ConfigMap
metadata:
  name: disable-local-path-script
  namespace: longhorn-system
data:
  disable-local-path.sh: |
    #!/bin/sh
    echo "Removing default annotation from local-path StorageClass..."
    kubectl annotate storageclass local-path storageclass.kubernetes.io/is-default-class=false --overwrite || true
    echo "Done!"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: disable-local-path-default
  namespace: longhorn-system
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      serviceAccountName: longhorn-disable-local-path
      restartPolicy: OnFailure
      containers:
      - name: disable-local-path
        image: bitnami/kubectl:latest
        command: ["/bin/sh", "/scripts/disable-local-path.sh"]
        volumeMounts:
        - name: script
          mountPath: /scripts
      volumes:
      - name: script
        configMap:
          name: disable-local-path-script
          defaultMode: 0755
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: longhorn-disable-local-path
  namespace: longhorn-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: longhorn-disable-local-path
rules:
- apiGroups: ["storage.k8s.io"]
  resources: ["storageclasses"]
  verbs: ["get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: longhorn-disable-local-path
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: longhorn-disable-local-path
subjects:
- kind: ServiceAccount
  name: longhorn-disable-local-path
  namespace: longhorn-system
