apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb
  namespace: argocd
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: metallb-system
  project: default
  ignoreDifferences:
    - group: "apiextensions.k8s.io"
      kind: CustomResourceDefinition
      name: bgppeers.metallb.io
      jsonPointers:
        - /spec/conversion/webhook/clientConfig/caBundle
    - group: "apiextensions.k8s.io"
      kind: CustomResourceDefinition
      name: addresspools.metallb.io
      jsonPointers:
        - /spec/conversion/webhook/clientConfig/caBundle
  sources:
  - repoURL: https://metallb.github.io/metallb
    chart: metallb
    targetRevision: "0.15.2"
    helm:
      valueFiles:
      - $values/apps/metallb-system/helm/values.yaml
  - repoURL: https://github.com/eudaldgr/homelab-gitops.git
    targetRevision: main
    ref: values
  - repoURL: https://github.com/eudaldgr/homelab-gitops.git
    targetRevision: main
    path: apps/metallb-system/k8s-manifests
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
